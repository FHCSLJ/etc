<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Preview</title>
    <style>
        /* Basic reset and dark theme for a cinematic feel */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        /* Responsive video player */
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: black;
        }

        h1 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tess Video Lesson Preview</h1>
        
        <video controls preload="metadata">
            <source src="twinshare.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
